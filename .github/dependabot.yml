version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      # Group all patch + minor updates into ONE PR per week per group.
      # Cuts the flood from ~10 individual PRs to 1-3 consolidated PRs.
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-dependencies:
        dependency-type: production
        update-types: [patch]
      # Major bumps stay as individual PRs (need per-package review).
    labels:
      - dependencies
